<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Radhey Dairy</title>
    <link rel="stylesheet" href="style.css">
    <!-- Razorpay checkout SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        /* ===== Cart Page Styles ===== */
        .cart-section {
            padding: var(--space-lg) 25px;
            min-height: 70vh;
            background: var(--bg-card);
        }

        .cart-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .cart-heading {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--text-h1);
            margin-bottom: var(--space-md);
        }

        /* ===== Empty cart ===== */
        .cart-empty {
            text-align: center;
            padding: 80px 20px;
        }

        .cart-empty .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .cart-empty h3 {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--text-heading);
            margin-bottom: 10px;
        }

        .cart-empty p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        /* ===== Cart item row ===== */
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: var(--space-md);
        }

        .cart-item {
            background: var(--text-white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-normal);
        }

        .cart-item:hover {
            box-shadow: var(--shadow-md);
        }

        .cart-item-name {
            flex: 1;
            font-weight: 500;
            color: var(--text-heading);
            font-size: 1.05rem;
        }

        .cart-item-unit {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ci-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            color: var(--text-heading);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            font-family: var(--font-body);
        }

        .ci-btn:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .ci-qty {
            width: 40px;
            text-align: center;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 5px 0;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .cart-item-price {
            font-weight: 600;
            color: var(--accent);
            font-size: 1.05rem;
            min-width: 80px;
            text-align: right;
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: #cc4444;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: var(--transition-fast);
        }

        .cart-item-remove:hover {
            background: #fff0f0;
        }

        /* ===== Order summary box ===== */
        .cart-summary {
            background: var(--text-white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--space-md);
        }

        .summary-title {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--text-h1);
            margin-bottom: var(--space-sm);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-light);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: var(--text-primary);
            font-size: 1rem;
            border-bottom: 1px solid var(--border-light);
        }

        .summary-row:last-of-type {
            border-bottom: none;
        }

        .summary-row.grand-total {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent);
            padding-top: 14px;
            margin-top: 4px;
            border-top: 2px solid var(--border-light);
        }

        /* ===== Payment method selector ===== */
        .payment-method-box {
            background: var(--text-white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--space-md);
        }

        .payment-method-box h3 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--text-h1);
            margin-bottom: var(--space-sm);
        }

        .pm-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border: 1.5px solid var(--border-light);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .pm-option:hover {
            border-color: var(--primary-light);
        }

        .pm-option.selected {
            border-color: var(--primary);
            background: rgba(90,158,122,0.07);
        }

        .pm-option input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .pm-option-text {
            display: flex;
            flex-direction: column;
        }

        .pm-option-title {
            font-weight: 500;
            color: var(--text-heading);
            font-size: 1rem;
        }

        .pm-option-sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* ===== Customer details form ===== */
        .customer-form {
            background: var(--text-white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--space-md);
        }

        .customer-form h3 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--text-h1);
            margin-bottom: var(--space-sm);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-field label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-heading);
        }

        .form-field input, .form-field textarea {
            padding: 10px 14px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--text-primary);
            background: var(--bg-card);
            transition: var(--transition-fast);
        }

        .form-field input:focus, .form-field textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(90,158,122,0.2);
            background: #fff;
        }

        .form-field textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* ===== Pay button ===== */
        .btn-pay {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-round);
            font-size: 1.15rem;
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }

        .btn-pay:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .pay-note {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .pay-note a {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="Dairy Logo" class="logo-img">
                <h2 class="logo-text">Radhey Dairy</h2>
            </a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html"   class="nav-link">Home</a></li>
                <li class="nav-item"><a href="cart.html"    class="nav-link">Cart</a></li>
                <li class="nav-item"><a href="#"            class="nav-link">Menu</a></li>
                <li class="nav-item"><a href="drinks.html"  class="nav-link">Drinks</a></li>
                <li class="nav-item"><a href="about.html"   class="nav-link">About</a></li>
                <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="cart-section">
            <div class="cart-container" id="cart-main">
                <h2 class="cart-heading">Your Cart</h2>

                <!-- Cart items list — rendered by JS -->
                <div id="cart-items-wrapper"></div>

                <!-- Order summary — rendered by JS -->
                <div id="cart-summary-wrapper"></div>

                <!-- Payment method — rendered by JS -->
                <div id="payment-method-wrapper"></div>

                <!-- Customer details form (shown only when cart has items) -->
                <div id="customer-form-wrapper"></div>

            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Radhey Dairy. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // ===== Cart Page Renderer =====

        const COD_HANDLING_CHARGE = 5;
        let paymentMethod = 'online'; // 'online' | 'cod'

        function renderCart() {
            const cart = getCart();
            const itemsWrapper   = document.getElementById('cart-items-wrapper');
            const summaryWrapper = document.getElementById('cart-summary-wrapper');
            const pmWrapper      = document.getElementById('payment-method-wrapper');
            const formWrapper    = document.getElementById('customer-form-wrapper');

            if (cart.length === 0) {
                itemsWrapper.innerHTML = `
                    <div class="cart-empty">
                        <div class="empty-icon">🛒</div>
                        <h3>Your cart is empty</h3>
                        <p>Add some fresh dairy products and come back!</p>
                        <a href="index.html" class="order-now" style="display:inline-block;padding:12px 30px;border-radius:999px;font-size:1rem;font-weight:500;">
                            Shop Now
                        </a>
                    </div>`;
                summaryWrapper.innerHTML = '';
                pmWrapper.innerHTML      = '';
                formWrapper.innerHTML    = '';
                return;
            }

            // --- Items ---
            let itemsHTML = '<div class="cart-items">';
            cart.forEach(item => {
                itemsHTML += `
                  <div class="cart-item" id="item-${item.key.replace(/[^a-z0-9]/gi, '_')}">
                    <div class="cart-item-name">
                        ${item.name}
                        ${item.unit ? `<span class="cart-item-unit">${item.unit}</span>` : ''}
                    </div>
                    <div class="cart-item-controls">
                        <button class="ci-btn" onclick="changeQty('${item.key}', -1)">−</button>
                        <input class="ci-qty" type="number" value="${item.qty}" min="1"
                               onchange="setQtyDirect('${item.key}', this.value)">
                        <button class="ci-btn" onclick="changeQty('${item.key}', 1)">+</button>
                    </div>
                    <div class="cart-item-price">₹${item.price * item.qty}</div>
                    <button class="cart-item-remove" onclick="deleteItem('${item.key}')" title="Remove">✕</button>
                  </div>`;
            });
            itemsHTML += '</div>';
            itemsWrapper.innerHTML = itemsHTML;

            // --- Totals ---
            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const delivery = subtotal < 100 ? 10 : 0;   // under ₹100 → ₹10, else free
            const handling = paymentMethod === 'cod' ? COD_HANDLING_CHARGE : 0;
            const grandTotal = subtotal + delivery + handling;

            // --- Summary ---
            summaryWrapper.innerHTML = `
              <div class="cart-summary">
                <h3 class="summary-title">Order Summary</h3>
                ${cart.map(i => `
                  <div class="summary-row">
                    <span>${i.name} × ${i.qty}</span>
                    <span>₹${i.price * i.qty}</span>
                  </div>`).join('')}
                <div class="summary-row">
                    <span>Subtotal</span><span>₹${subtotal}</span>
                </div>
                <div class="summary-row">
                    <span>Delivery</span>
                    <span>${delivery === 0 ? '<span style="color:var(--primary)">Free 🎉</span>' : '₹' + delivery}</span>
                </div>
                ${subtotal < 100 ? `<div style="font-size:0.85rem;color:var(--text-secondary);padding:4px 0;">
                    Add ₹${100 - subtotal} more for free delivery</div>` : ''}
                ${handling > 0 ? `
                <div class="summary-row">
                    <span>COD Handling Charge</span><span>₹${handling}</span>
                </div>` : ''}
                <div class="summary-row grand-total">
                    <span>Total</span><span>₹${grandTotal}</span>
                </div>
              </div>`;

            // --- Payment method selector ---
            pmWrapper.innerHTML = `
              <div class="payment-method-box">
                <h3>Payment Method</h3>
                <label class="pm-option ${paymentMethod === 'online' ? 'selected' : ''}">
                    <input type="radio" name="paymentMethod" value="online" ${paymentMethod === 'online' ? 'checked' : ''}>
                    <div class="pm-option-text">
                        <span class="pm-option-title">Pay Online</span>
                        <span class="pm-option-sub">UPI · Cards · Wallets · Net Banking</span>
                    </div>
                </label>
                <label class="pm-option ${paymentMethod === 'cod' ? 'selected' : ''}">
                    <input type="radio" name="paymentMethod" value="cod" ${paymentMethod === 'cod' ? 'checked' : ''}>
                    <div class="pm-option-text">
                        <span class="pm-option-title">Cash on Delivery</span>
                        <span class="pm-option-sub">+₹${COD_HANDLING_CHARGE} handling charge</span>
                    </div>
                </label>
              </div>`;

            pmWrapper.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    // Preserve typed customer details across re-render
                    const saved = getCustomerFieldValues();
                    paymentMethod = e.target.value;
                    renderCart();
                    restoreCustomerFieldValues(saved);
                });
            });

            // --- Customer form + Pay button ---
            const payLabel = paymentMethod === 'cod'
                ? `Place Order — Pay ₹${grandTotal} on Delivery`
                : `Pay ₹${grandTotal} — Secure Checkout`;

            formWrapper.innerHTML = `
              <div class="customer-form">
                <h3>Delivery Details</h3>
                <div class="form-row">
                    <div class="form-field">
                        <label for="cust-name">Your Name</label>
                        <input id="cust-name" type="text" placeholder="Ramesh Kumar">
                    </div>
                    <div class="form-field">
                        <label for="cust-phone">Phone Number</label>
                        <input id="cust-phone" type="tel" placeholder="9876543210">
                    </div>
                </div>
                <div class="form-row" style="grid-template-columns:1fr;">
                    <div class="form-field">
                        <label for="cust-address">Delivery Address</label>
                        <textarea id="cust-address" placeholder="House no., Street, Locality, City"></textarea>
                    </div>
                </div>
              </div>

              <button class="btn-pay" onclick="handlePayClick()">
                  ${payLabel}
              </button>
              <p class="pay-note">
                  ${paymentMethod === 'cod'
                    ? 'Pay with cash when your order arrives.'
                    : 'Payments secured by <a href="https://razorpay.com" target="_blank">Razorpay</a>.'}
              </p>`;
        }

        // ===== Preserve form field values across re-render =====

        function getCustomerFieldValues() {
            return {
                name: document.getElementById('cust-name')?.value || '',
                phone: document.getElementById('cust-phone')?.value || '',
                address: document.getElementById('cust-address')?.value || '',
            };
        }

        function restoreCustomerFieldValues(vals) {
            const nameEl = document.getElementById('cust-name');
            const phoneEl = document.getElementById('cust-phone');
            const addrEl = document.getElementById('cust-address');
            if (nameEl) nameEl.value = vals.name;
            if (phoneEl) phoneEl.value = vals.phone;
            if (addrEl) addrEl.value = vals.address;
        }

        // ===== Cart actions (call renderCart after each) =====

        function changeQty(key, delta) {
            const cart = getCart();
            const item = cart.find(i => i.key === key);
            if (!item) return;
            const newQty = item.qty + delta;
            if (newQty < 1) { removeFromCart(key); }
            else { updateQty(key, newQty); }
            renderCart();
        }

        function setQtyDirect(key, value) {
            const qty = parseInt(value);
            if (isNaN(qty) || qty < 1) { removeFromCart(key); }
            else { updateQty(key, qty); }
            renderCart();
        }

        function deleteItem(key) {
            removeFromCart(key);
            renderCart();
        }

        // ===== Pay button handler =====

        function handlePayClick() {
            const name    = document.getElementById('cust-name')?.value.trim()    || '';
            const phone   = document.getElementById('cust-phone')?.value.trim()   || '';
            const address = document.getElementById('cust-address')?.value.trim() || '';

            if (!name)    { showToast('Please enter your name.');    return; }
            if (!phone || phone.length < 10) { showToast('Please enter a valid phone number.'); return; }
            if (!address) { showToast('Please enter delivery address.'); return; }

            if (paymentMethod === 'cod') {
                startCodOrder(name, phone, address);
            } else {
                startPayment(name, phone, address);
            }
        }

        // Initial render
        renderCart();
    </script>
</body>
</html>
